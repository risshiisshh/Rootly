apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rootly
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: us-central1-docker.pkg.dev/rootly-18a49/rootly-docker-repo/rootly:latest
          ports:
            - name: http1
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: FIREBASE_ADMIN_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: FIREBASE_ADMIN_PRIVATE_KEY
                  key: latest
            - name: FIREBASE_ADMIN_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: FIREBASE_ADMIN_PROJECT_ID
                  key: latest
            - name: FIREBASE_ADMIN_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: FIREBASE_ADMIN_CLIENT_EMAIL
                  key: latest
            - name: NEXT_PUBLIC_FIREBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_FIREBASE_API_KEY
                  key: latest
            - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
                  key: latest
            - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
                  key: latest
            - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
                  key: latest
            - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
                  key: latest
            - name: NEXT_PUBLIC_FIREBASE_APP_ID
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_FIREBASE_APP_ID
                  key: latest
            - name: GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_MAPS_API_KEY
                  key: latest
            - name: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
                  key: latest
            - name: GOOGLE_SPEECH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_SPEECH_API_KEY
                  key: latest
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: NEXTAUTH_SECRET
                  key: latest
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: NEXTAUTH_URL
                  key: latest
            - name: NEXT_PUBLIC_FORCE_DEMO
              value: "false"
            - name: NEXT_PUBLIC_HAS_GEMINI_KEY
              value: "true"
